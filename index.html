<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to your account on AuthUI — a secure authentication system." />
  <title>Login — AuthUI</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- Decorative ambient orbs -->
  <div class="orb orb-a" aria-hidden="true"></div>
  <div class="orb orb-b" aria-hidden="true"></div>

  <main class="auth-wrapper">
    <div class="auth-card">

      <!-- Brand logo -->
      <div class="brand-icon" aria-hidden="true">
        <i class="bi bi-shield-lock-fill"></i>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue to your dashboard</p>

      <!-- Login Form -->
      <form id="loginForm" novalidate>

        <!-- Email field -->
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <div class="input-group">
            <span class="input-group-text" style="border-radius:10px 0 0 10px !important; border-right:none !important;">
              <i class="bi bi-envelope"></i>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              class="form-control"
              placeholder="you@example.com"
              autocomplete="email"
              required
              style="border-radius:0 10px 10px 0 !important;"
            />
            <div class="invalid-feedback">Please enter a valid email address.</div>
          </div>
        </div>

        <!-- Password field -->
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="password" class="form-label mb-0">Password</label>
            <a href="forgot-password.html" class="auth-link" style="font-size:.78rem;">Forgot password?</a>
          </div>
          <div class="input-group">
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
              style="border-radius:10px 0 0 10px !important;"
            />
            <span class="input-group-text" id="togglePwd" role="button" tabindex="0" aria-label="Toggle password visibility">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </span>
            <div class="invalid-feedback">Please enter your password.</div>
          </div>
        </div>

        <!-- Remember me -->
        <div class="mb-3">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="rememberMe" />
            <label class="form-check-label" for="rememberMe">Remember me for 30 days</label>
          </div>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn-auth mt-1" id="loginBtn">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <!-- Footer links -->
      <p class="auth-footer">
        Don't have an account?&nbsp;
        <a href="register.html" class="auth-link">Create one free</a>
      </p>

    </div>
  </main>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ── Password visibility toggle ──
    const toggleBtn = document.getElementById('togglePwd');
    const pwdInput  = document.getElementById('password');
    const eyeIcon   = document.getElementById('eyeIcon');

    function togglePwdVisibility() {
      const isHidden = pwdInput.type === 'password';
      pwdInput.type  = isHidden ? 'text' : 'password';
      eyeIcon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
    }

    toggleBtn.addEventListener('click', togglePwdVisibility);
    toggleBtn.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') togglePwdVisibility();
    });

    // ── Form validation with loading spinner ──
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const emailEl = document.getElementById('email');
      const pwdEl   = document.getElementById('password');
      const btn     = document.getElementById('loginBtn');
      let valid = true;

      // Clear previous states
      [emailEl, pwdEl].forEach(el => el.classList.remove('is-invalid', 'is-valid'));

      // Validate email
      if (!emailEl.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
        emailEl.classList.add('is-invalid');
        valid = false;
      } else {
        emailEl.classList.add('is-valid');
      }

      // Validate password
      if (!pwdEl.value.trim()) {
        pwdEl.classList.add('is-invalid');
        valid = false;
      } else {
        pwdEl.classList.add('is-valid');
      }

      // Submit with loading spinner
      if (valid) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Signing in…';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
      }
    });
  </script>
</body>
</html>
