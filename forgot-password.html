<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Forgot your password? Reset it via email on AuthUI." />
  <title>Forgot Password — AuthUI</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- Decorative ambient orbs -->
  <div class="orb orb-a" aria-hidden="true"></div>
  <div class="orb orb-b" aria-hidden="true"></div>

  <main class="auth-wrapper">
    <div class="auth-card">

      <!-- Brand logo -->
      <div class="brand-icon" aria-hidden="true">
        <i class="bi bi-key-fill"></i>
      </div>

      <h1 class="auth-title">Forgot password?</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

      <!-- Success message (shown after submit) -->
      <div class="alert-success-custom" id="successMsg" role="alert" style="display:none;">
        <i class="bi bi-check-circle-fill"></i>
        <span>Reset link sent! Check your inbox.</span>
      </div>

      <!-- Forgot Password Form -->
      <form id="forgotForm" novalidate>

        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <div class="input-group">
            <span class="input-group-text" style="border-radius:10px 0 0 10px !important; border-right:none !important;">
              <i class="bi bi-envelope"></i>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              class="form-control"
              placeholder="you@example.com"
              autocomplete="email"
              required
              style="border-radius:0 10px 10px 0 !important;"
            />
            <div class="invalid-feedback">Please enter a valid email address.</div>
          </div>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn-auth" id="submitBtn">
          <i class="bi bi-send me-2"></i>Send Reset Link
        </button>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>or</span>
      </div>

      <!-- Navigation links -->
      <p class="auth-footer" style="margin-top:0;">
        <a href="index.html" class="auth-link">
          <i class="bi bi-arrow-left me-1"></i>Back to Sign In
        </a>
      </p>
      <p class="auth-footer" style="margin-top:0.6rem;">
        Don't have an account?&nbsp;
        <a href="register.html" class="auth-link">Create one free</a>
      </p>

    </div>
  </main>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const emailEl   = document.getElementById('email');
      const successEl = document.getElementById('successMsg');
      const submitBtn = document.getElementById('submitBtn');

      emailEl.classList.remove('is-invalid', 'is-valid');

      // Validate email
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
        emailEl.classList.add('is-invalid');
        return;
      }

      emailEl.classList.add('is-valid');

      // Show loading spinner
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Sending…';

      // Simulate API call
      setTimeout(() => {
        this.style.display = 'none';
        successEl.style.display = 'flex';
        // Auto-redirect to login after 3 seconds
        setTimeout(() => { window.location.href = 'index.html'; }, 3000);
      }, 1500);
    });
  </script>
</body>
</html>
